<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Laptop Catalog — LaptopFinder</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .catalog-table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .catalog-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 0.88rem;
        }
        .catalog-table thead th {
            position: sticky;
            top: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0.7rem 0.8rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent);
            white-space: nowrap;
            z-index: 2;
        }
        /* Pro mode overrides for table */
        body.pro-mode .catalog-table thead th {
            background: rgba(0,10,0,0.95);
            border-bottom-color: #00ff00;
        }
        body.pro-mode .catalog-table tbody tr:hover {
            background: rgba(0,255,0,0.06);
        }
        body.pro-mode .catalog-table td {
            border-bottom-color: rgba(0,255,0,0.08);
        }
        body.pro-mode .search-bar {
            background: rgba(0,20,0,0.6);
            border-color: rgba(0,255,0,0.25);
            color: #00ff00;
        }
        body.pro-mode .search-bar:focus {
            border-color: #00ff00;
            box-shadow: 0 0 0 4px rgba(0,255,0,0.15);
        }
        body.pro-mode .search-bar::placeholder { color: rgba(0,255,0,0.4); }
        body.pro-mode .chip-intel  { background: rgba(0,255,0,0.1); color: #00ff00; }
        body.pro-mode .chip-amd    { background: rgba(0,255,0,0.1); color: #00cc00; }
        body.pro-mode .chip-apple  { background: rgba(0,255,0,0.1); color: #33ff33; }
        body.pro-mode .amazon-link { color: #00ff00; }

        .catalog-table tbody tr {
            transition: background 0.2s;
        }
        .catalog-table tbody tr:hover {
            background: rgba(0,113,227,0.04);
        }
        .catalog-table td {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            white-space: nowrap;
            color: var(--text-secondary);
        }
        .catalog-table td:first-child { font-weight: 600; color: var(--text-primary); white-space: normal; min-width: 200px; }
        .catalog-table .price-cell { font-weight: 600; color: var(--text-primary); }
        .catalog-table .chip-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .chip-intel  { background: #dbeafe; color: #1d4ed8; }
        .chip-amd    { background: #fce7f3; color: #be185d; }
        .chip-apple  { background: #f3e8ff; color: #7c3aed; }
        .search-bar {
            width: 100%;
            padding: 0.8rem 1.2rem;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            font-family: inherit;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .search-bar:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,113,227,0.12);
        }
        .catalog-count {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 1rem;
        }
        .amazon-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .amazon-link:hover { text-decoration: underline; }
    </style>
</head>
<body th:classappend="${mode == 'pro'} ? 'pro-mode' : ''">

<canvas id="binary-rain"></canvas>

<!-- Dark Mode Toggle -->
<div class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()">☀️</div>

    <div class="container" style="position:relative;">
        <div style="position: absolute; top: 0rem; left: 0rem; z-index: 10; display: flex; flex-direction: column; gap: 0.5rem;">
            <a th:href="@{/}" class="btn btn-outline" style="width: auto; padding: 0.5rem 1rem; text-decoration: none; font-weight: bold; border-radius: 8px;">⌂ Home</a>
            <a href="javascript:history.back()" class="btn btn-outline" style="width: auto; padding: 0.5rem 1rem; text-decoration: none; font-weight: bold; border-radius: 8px;">← Back</a>
        </div>

        <div class="header" style="padding-top: 1.5rem;">
            <h1 th:text="${mode == 'pro'} ? '>_ Full Catalog' : '📋 Full Laptop Catalog'">📋 Full Laptop Catalog</h1>
            <p>All <strong th:text="${totalCount}">0</strong> laptops in our Indian market database.</p>
        </div>

        <div class="glass-card" style="padding:1.5rem;">
            <input type="text" class="search-bar" id="searchInput"
                   th:placeholder="${mode == 'pro'} ? '> grep -i ...' : '🔍  Search by name, brand, chipset, GPU...'"
                   onkeyup="filterTable()">

            <div class="catalog-table-wrap">
                <table class="catalog-table" id="catalogTable">
                    <thead>
                        <tr>
                            <th>Laptop</th>
                            <th>Price (₹)</th>
                            <th>Chipset</th>
                            <th>CPU</th>
                            <th>GPU</th>
                            <th>RAM</th>
                            <th>Storage</th>
                            <th>Display</th>
                            <th>Rating</th>
                            <th>Source</th>
                            <th>Buy</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="laptop : ${laptops}">
                            <td th:text="${laptop.title}">Name</td>
                            <td class="price-cell" th:text="'₹' + ${#numbers.formatDecimal(laptop.price, 1, 0)}">₹0</td>
                            <td>
                                <span class="chip-badge"
                                      th:classappend="${laptop.chipsetFamily == 'Intel'} ? 'chip-intel' : (${laptop.chipsetFamily == 'AMD'} ? 'chip-amd' : 'chip-apple')"
                                      th:text="${laptop.chipsetFamily}">Chip</span>
                            </td>
                            <td th:text="${laptop.cpuTier} + ' · ' + ${laptop.cpuGeneration}">CPU</td>
                            <td th:text="${laptop.gpuModel}">GPU</td>
                            <td th:text="${laptop.ramGB} + ' GB'">RAM</td>
                            <td th:text="${laptop.storageCapacity}">Storage</td>
                            <td th:text="${laptop.displaySize} + '&quot; ' + ${laptop.displayType}">Display</td>
                            <td th:text="${laptop.rating} + ' ⭐'">Rating</td>
                            <td>
                                <span class="badge bg-secondary" th:text="${laptop.source != null ? laptop.source : 'SEEDER'}">Source</span>
                                <div style="font-size: 0.7rem; color: gray;" th:if="${laptop.lastScrapedAt != null}" th:text="${#dates.format(laptop.lastScrapedAt, 'dd-MMM-yyyy')}">Date</div>
                            </td>
                            <td>
                                <a th:href="${laptop.productUrl != null ? laptop.productUrl : 'https://www.amazon.in/s?k=' + laptop.title}" target="_blank" class="amazon-link">Buy →</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="catalog-count" id="resultCount">Showing all laptops</div>
        </div>

        <div style="text-align:center; margin: 3rem 0;">
            <a th:href="@{/}" class="btn btn-outline" style="text-decoration:none;">← Back to Recommender</a>
        </div>
    </div>

    <script>
        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#catalogTable tbody tr');
            let visible = 0;
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                const show = text.includes(q);
                row.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            document.getElementById('resultCount').textContent =
                q ? 'Showing ' + visible + ' of ' + rows.length + ' laptops' : 'Showing all laptops';
        }

        // Binary rain for pro mode
        (function() {
            const canvas = document.getElementById('binary-rain');
            if (!canvas || !document.body.classList.contains('pro-mode')) return;
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const cols = Math.floor(canvas.width / 18);
            const drops = Array(cols).fill(1);
            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff0033';
                ctx.font = '14px monospace';
                for (let i = 0; i < drops.length; i++) {
                    const t = Math.random() > 0.5 ? '1' : '0';
                    ctx.fillText(t, i * 18, drops[i] * 18);
                    if (drops[i] * 18 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 50);
            window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        })();

        // Dark mode
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('darkToggle').textContent = '🌙';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isDark);
            document.getElementById('darkToggle').textContent = isDark ? '🌙' : '☀️';
        }
    </script>
</body>
</html>
